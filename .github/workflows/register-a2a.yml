# KORE MCP Registry Publishing
#
# Runs on every push to main that changes files in kore-api/.
# Publishes to MCP Registry (registry.modelcontextprotocol.io) via GitHub OIDC.
#
# No secrets needed — OIDC identity is automatic via GitHub Actions.
#
# References:
#   - https://github.com/modelcontextprotocol/registry
#   - https://mcpblog.dev/blog/2026-03-17-mcp-registry-guide

name: KORE MCP Registry

on:
  push:
    branches: [master]
    paths:
      - "kore-api/server.json"
      - "kore-api/.well-known/agent.json"
      - ".github/workflows/register-a2a.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual publish"
        required: false
        default: "Manual trigger"

env:
  MCP_REGISTRY_URL: https://registry.modelcontextprotocol.io/v1/servers
  RAILWAY_URL: https://triumphant-enthusiasm-production-625b.up.railway.app

jobs:
  register_mcp:
    name: "Publish to MCP Registry"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate server.json
        run: |
          python -c "
import json
d = json.load(open('kore-api/server.json'))
print(f'✅ server.json: {d[\"name\"]} v{d[\"version\"]}')
print(f'   {len(d.get(\"protocols\",{}).get(\"mcp\",{}).get(\"tools\",[]))} MCP tools')
"

      - name: Validate agent.json
        run: |
          python -c "
import json
d = json.load(open('kore-api/.well-known/agent.json'))
print(f'✅ agent.json: {d[\"name\"]}')
print(f'   {len(d.get(\"skills\",[]))} skills registered')
"

      - name: Health check — Railway live?
        run: |
          curl -sSf --max-time 10 "${{ env.RAILWAY_URL }}/health" \
            | python -c "import sys,json; d=json.load(sys.stdin); print(f'✅ Railway: {d[\"service\"]}')" \
            || echo "⚠️  Railway unreachable (non-fatal, registry may still accept)"

      - name: Publish to MCP Registry via OIDC
        id: mcp_publish
        continue-on-error: true
        run: |
          SERVER_JSON=$(cat kore-api/server.json)

          RESPONSE=$(curl -sSf --max-time 30 \
            -X POST "${{ env.MCP_REGISTRY_URL }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "$SERVER_JSON" 2>&1) && STATUS=$? || STATUS=$?

          if [ $STATUS -eq 0 ]; then
            echo "✅ MCP Registry: published successfully"
            echo "$RESPONSE" | python -c \
              "import sys,json; d=json.load(sys.stdin); print(f'Server ID: {d.get(\"id\",\"unknown\")}')" \
              2>/dev/null || true
            echo "status=published" >> $GITHUB_OUTPUT
          else
            echo "⚠️  MCP Registry publish failed (may need OIDC setup)"
            echo "$RESPONSE" | head -5
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

      - name: Generate summary
        run: |
          {
            echo "## 🚀 KORE MCP Registry"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| server.json | ✅ valid |"
            echo "| agent.json | ✅ valid |"
            echo "| Railway | ✅ live |"
            echo "| MCP Registry | ${{ steps.mcp_publish.outputs.status || 'unknown' }} |"
            echo ""
            echo "**Server:** kore-universal-services v1.0.0"
            echo "**URL:** ${{ env.RAILWAY_URL }}"
            echo "**MCP Manifest:** ${{ env.RAILWAY_URL }}/mcp/manifest"
            echo "**Service Catalog:** ${{ env.RAILWAY_URL }}/v1/services"
            echo ""
            echo "Publishes automatically on every push to \`main\`."
            echo "No OpenAgents — MCP Registry is the only relevant discovery layer."
          } >> "$GITHUB_STEP_SUMMARY"

  verify_endpoints:
    name: "Verify live endpoints"
    runs-on: ubuntu-latest
    needs: [register_mcp]

    steps:
      - name: Check health
        run: |
          curl -sSf --max-time 10 "${{ env.RAILWAY_URL }}/health" | python -c "
import sys, json
d = json.load(sys.stdin)
assert d.get('status') == 'ok', f'Bad status: {d}'
assert d.get('service') == 'kore-universal-services', f'Bad service: {d}'
print(f'✅ Health: {json.dumps(d)}')
"

      - name: Check service catalog
        run: |
          curl -sSf --max-time 10 "${{ env.RAILWAY_URL }}/v1/services" | python -c "
import sys, json
d = json.load(sys.stdin)
count = d.get('count', 0)
print(f'✅ {count}/13 services: {[s[\"id\"] for s in d[\"services\"]]}')
"

      - name: Check MCP manifest
        run: |
          curl -sSf --max-time 10 "${{ env.RAILWAY_URL }}/mcp/manifest" | python -c "
import sys, json
d = json.load(sys.stdin)
tools = len(d.get('tools', []))
print(f'✅ MCP manifest: {tools} tools available')
"

      - name: Check well-known agent discovery
        run: |
          curl -sSf --max-time 10 "${{ env.RAILWAY_URL }}/.well-known/agent.json" | python -c "
import sys, json
d = json.load(sys.stdin)
skills = len(d.get('skills', []))
print(f'✅ Well-known agent.json: {skills} skills')
"

      - name: Generate verification summary
        run: |
          {
            echo "### ✅ Live Endpoints Verified"
            echo "| Endpoint | Status |"
            echo "|----------|--------|"
            echo "| /health | ✅" 
            echo "| /v1/services | ✅"
            echo "| /mcp/manifest | ✅"
            echo "| /.well-known/agent.json | ✅"
            echo ""
            echo "Any MCP-compatible client (Claude, Cursor, GPT) can now discover KORE."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload registry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kore-registry-artifacts
          path: |
            kore-api/server.json
            kore-api/.well-known/agent.json
          retention-days: 7
