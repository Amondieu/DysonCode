<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DysonCode Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; font-size: 13px; }

/* ── Tokens ─────────────────────────────────────────────── */
:root {
  --bg:            #0b0c0e;
  --surface:       #0f1012;
  --surface-2:     #141518;
  --surface-3:     #191b1f;
  --surface-4:     #1e2025;
  --border:        rgba(255,255,255,0.06);
  --border-b:      rgba(255,255,255,0.10);
  --cyan:          #00d4d4;
  --cyan-glow:     rgba(0,212,212,0.12);
  --cyan-dim:      rgba(0,212,212,0.5);
  --green:         #22c55e;
  --red:           #ef4444;
  --amber:         #f59e0b;
  --text:          #d1d5db;
  --text-m:        #6b7280;
  --text-f:        #374151;
  --mono:          'JetBrains Mono', monospace;
  --ease:          cubic-bezier(0.16,1,0.3,1);
}

/* ── Layout ─────────────────────────────────────────────── */
.browser-shell {
  display: flex; flex-direction: column;
  height: 100vh; background: var(--bg); color: var(--text);
}

/* ── Tab Bar ─────────────────────────────────────────────── */
.tab-bar {
  display: flex; align-items: flex-end;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 8px 0;
  gap: 2px;
  min-height: 36px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
.tab-bar::-webkit-scrollbar { display: none; }

.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px 5px 9px;
  background: var(--surface-2);
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  cursor: pointer; min-width: 100px; max-width: 200px;
  transition: background 0.12s, border-color 0.12s;
  flex-shrink: 0;
  animation: tabIn 0.18s var(--ease) both;
}
@keyframes tabIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.tab:hover { background: var(--surface-3); }
.tab.active {
  background: var(--surface-4);
  border-color: var(--border-b);
  border-bottom-color: var(--surface-4);
  z-index: 1;
}
.tab-favicon {
  width: 14px; height: 14px; flex-shrink: 0; border-radius: 2px;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.tab-title {
  flex: 1; font-size: 11.5px; color: var(--text-m);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tab.active .tab-title { color: var(--text); }
.tab-close {
  width: 16px; height: 16px; flex-shrink: 0;
  background: none; border: none; cursor: pointer;
  color: var(--text-f); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; line-height: 1; opacity: 0;
  transition: opacity 0.1s, background 0.1s, color 0.1s;
}
.tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
.tab-close:hover { background: rgba(239,68,68,0.15); color: var(--red); }

/* Loading spinner on tab */
@keyframes tabSpin { to { transform: rotate(360deg); } }
.tab-spinner { animation: tabSpin 0.7s linear infinite; font-size: 11px; }

.tab-new-btn {
  width: 28px; height: 28px; flex-shrink: 0; margin-bottom: 2px;
  background: none; border: 1px solid var(--border);
  border-radius: 5px; color: var(--text-m); cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  align-self: center;
}
.tab-new-btn:hover { background: var(--surface-3); color: var(--cyan); border-color: var(--cyan-dim); }

/* ── Toolbar ─────────────────────────────────────────────── */
.toolbar {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface-2); border-bottom: 1px solid var(--border);
  padding: 5px 8px;
}

.tb-btn {
  width: 28px; height: 28px; flex-shrink: 0;
  background: none; border: 1px solid transparent;
  border-radius: 5px; color: var(--text-m); cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.tb-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-b); }
.tb-btn:disabled { color: var(--text-f); cursor: default; }
.tb-btn:disabled:hover { background: none; border-color: transparent; }
.tb-btn.active-btn { color: var(--cyan); border-color: rgba(0,212,212,0.3); background: var(--cyan-glow); }

/* URL bar */
.url-bar-wrap {
  flex: 1; display: flex; align-items: center;
  background: var(--surface-3); border: 1px solid var(--border-b);
  border-radius: 7px; padding: 0 10px; gap: 7px; height: 30px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.url-bar-wrap:focus-within {
  border-color: rgba(0,212,212,0.5);
  box-shadow: 0 0 0 3px rgba(0,212,212,0.07);
}
.url-lock { font-size: 11px; color: var(--text-m); flex-shrink: 0; }
.url-lock.secure { color: var(--green); }
.url-lock.insecure { color: var(--amber); }
.url-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono); font-size: 11.5px; color: var(--text);
}
.url-input::selection { background: var(--cyan-glow); }

/* Zoom indicator */
.zoom-badge {
  font-family: var(--mono); font-size: 10px; color: var(--text-m);
  background: var(--surface-4); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; cursor: pointer; flex-shrink: 0;
  transition: color 0.1s, border-color 0.1s;
  display: none;
}
.zoom-badge.visible { display: block; }
.zoom-badge:hover { color: var(--cyan); border-color: var(--cyan-dim); }

/* Blocked counter */
.blocked-badge {
  font-family: var(--mono); font-size: 10px;
  color: var(--green); padding: 1px 6px;
  background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2);
  border-radius: 4px; flex-shrink: 0; cursor: default;
  display: none;
}
.blocked-badge.visible { display: block; }

/* AdBlock toggle */
.adblock-btn {
  width: 28px; height: 28px; flex-shrink: 0;
  background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.25);
  border-radius: 5px; color: var(--green); cursor: pointer;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.adblock-btn:hover { background: rgba(34,197,94,0.15); }
.adblock-btn.off { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: var(--red); }
.adblock-btn[title]:hover::after {
  content: attr(title);
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface-4); border: 1px solid var(--border-b);
  border-radius: 5px; padding: 4px 8px;
  font-size: 10.5px; color: var(--text); white-space: nowrap;
  z-index: 100; pointer-events: none; font-family: 'Inter', sans-serif;
}

/* ── Content area ───────────────────────────────────────── */
.content-area {
  flex: 1; position: relative; background: #fff; overflow: hidden;
}

/* Loading bar */
.loading-bar {
  position: absolute; top: 0; left: 0; height: 2px;
  background: var(--cyan);
  box-shadow: 0 0 8px rgba(0,212,212,0.6);
  width: 0%; z-index: 10; transition: width 0.3s var(--ease);
  opacity: 0; pointer-events: none;
}
.loading-bar.active { opacity: 1; }

/* New tab page (shown when WebContentsView not visible) */
.new-tab-page {
  position: absolute; inset: 0;
  background: var(--bg); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  z-index: 1;
}
.ntp-logo {
  font-family: var(--mono); font-size: 22px; font-weight: 500;
  color: var(--cyan); letter-spacing: 0.05em;
}
.ntp-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface-3); border: 1px solid var(--border-b);
  border-radius: 24px; padding: 9px 16px; width: 420px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.ntp-search:focus-within {
  border-color: rgba(0,212,212,0.5);
  box-shadow: 0 0 0 4px rgba(0,212,212,0.07);
}
.ntp-search input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif;
}
.ntp-search input::placeholder { color: var(--text-m); }
.ntp-search-btn {
  background: var(--cyan); border: none; border-radius: 18px;
  padding: 4px 12px; font-size: 11.5px; color: #0b0c0e;
  font-weight: 500; cursor: pointer; transition: background 0.15s;
}
.ntp-search-btn:hover { background: #00e5e5; }

.ntp-bookmarks {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  max-width: 460px;
}
.ntp-bookmark {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px;
  font-size: 11.5px; color: var(--text-m); cursor: pointer;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  display: flex; align-items: center; gap: 6px;
}
.ntp-bookmark:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-b); }

/* ── Status bar ─────────────────────────────────────────── */
.browser-status {
  height: 20px; background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 10px; gap: 12px;
  font-size: 10px; font-family: var(--mono); color: var(--text-f); flex-shrink: 0;
}
.status-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-sep { color: var(--surface-4); }

/* ── Zoom overlay ───────────────────────────────────────── */
.zoom-overlay {
  position: absolute; top: 50px; right: 14px;
  background: var(--surface-3); border: 1px solid var(--border-b);
  border-radius: 8px; padding: 6px 8px;
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 20; opacity: 0; pointer-events: none;
  transform: translateY(-4px);
  transition: opacity 0.15s, transform 0.15s;
}
.zoom-overlay.visible { opacity: 1; pointer-events: all; transform: none; }
.zoom-level {
  font-family: var(--mono); font-size: 12px; color: var(--text);
  min-width: 40px; text-align: center;
}
.zoom-ctrl {
  width: 24px; height: 24px; background: var(--surface-4);
  border: 1px solid var(--border-b); border-radius: 4px;
  color: var(--text-m); cursor: pointer; font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s, color 0.1s;
}
.zoom-ctrl:hover { background: var(--surface-3); color: var(--text); }
.zoom-reset-btn {
  font-size: 10px; color: var(--text-m); cursor: pointer; font-family: var(--mono);
  padding: 2px 6px; border-radius: 4px; transition: color 0.1s;
}
.zoom-reset-btn:hover { color: var(--cyan); }

</style>
</head>
<body>
<div class="browser-shell">

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <!-- tabs injected by JS -->
    <button class="tab-new-btn" id="btnNewTab" title="New tab (Ctrl+T)">+</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tb-btn" id="btnBack"    title="Back (Alt+←)"    disabled>←</button>
    <button class="tb-btn" id="btnForward" title="Forward (Alt+→)"  disabled>→</button>
    <button class="tb-btn" id="btnReload"  title="Reload (F5)">↺</button>

    <div class="url-bar-wrap">
      <span class="url-lock secure" id="urlLock">🔒</span>
      <input class="url-input" id="urlInput" type="text"
             placeholder="Search or enter URL…"
             onKeydown="onUrlKey(event)" onfocus="this.select()">
      <div class="zoom-badge" id="zoomBadge" onclick="toggleZoomOverlay()">100%</div>
      <div class="blocked-badge" id="blockedBadge" title="Requests blocked">🛡 0</div>
    </div>

    <button class="tb-btn adblock-btn" id="btnAdblock" title="AdBlock ON — click to toggle" onclick="toggleAdBlock()">🛡</button>
    <button class="tb-btn" id="btnZoom"    title="Zoom"    onclick="toggleZoomOverlay()">🔍</button>
    <button class="tb-btn" id="btnDevTools" title="DevTools" onclick="send('browser:open-devtools')">⚙</button>
  </div>

  <!-- Zoom overlay -->
  <div class="zoom-overlay" id="zoomOverlay">
    <button class="zoom-ctrl" onclick="send('browser:zoom-out')">−</button>
    <span class="zoom-level" id="zoomLevel">100%</span>
    <button class="zoom-ctrl" onclick="send('browser:zoom-in')">+</button>
    <span class="zoom-reset-btn" onclick="send('browser:zoom-reset')">Reset</span>
  </div>

  <!-- Content -->
  <div class="content-area" id="contentArea">
    <div class="loading-bar" id="loadingBar"></div>

    <!-- New tab page — shown when no WebContentsView content yet -->
    <div class="new-tab-page" id="newTabPage">
      <div class="ntp-logo">Dyson<span style="color:var(--text-m)">Browser</span></div>
      <div class="ntp-search">
        <span style="color:var(--text-m);font-size:13px">🔍</span>
        <input id="ntpSearch" placeholder="Search DuckDuckGo or enter URL…" onKeydown="onNtpKey(event)">
        <button class="ntp-search-btn" onclick="ntpGo()">Go</button>
      </div>
      <div class="ntp-bookmarks">
        <div class="ntp-bookmark" onclick="navigate('https://github.com')">🐙 GitHub</div>
        <div class="ntp-bookmark" onclick="navigate('https://crates.io')">🦀 crates.io</div>
        <div class="ntp-bookmark" onclick="navigate('https://npmjs.com')">📦 npmjs</div>
        <div class="ntp-bookmark" onclick="navigate('https://docs.rs')">📖 docs.rs</div>
        <div class="ntp-bookmark" onclick="navigate('https://news.ycombinator.com')">🔶 HN</div>
        <div class="ntp-bookmark" onclick="navigate('http://localhost:4000')">⚡ LiteLLM</div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="browser-status">
    <span class="status-url" id="statusUrl"></span>
    <span class="status-sep">·</span>
    <span id="statusZoom">100%</span>
    <span class="status-sep">·</span>
    <span id="statusAd" style="color:var(--green)">🛡 AdBlock ON</span>
  </div>
</div>

<script>
// ── IPC bridge ────────────────────────────────────────────
// In Electron, window.electronAPI is exposed via contextBridge in preload
// For standalone preview, we stub it:
const ipc = window.electronAPI ?? {
  send: (ch, d) => console.log('[IPC→Main]', ch, d),
  on: (ch, cb) => console.log('[IPC listen]', ch),
};
function send(ch, d) { ipc.send(ch, d); }

// ── State ──────────────────────────────────────────────────
let tabs = [];
let activeId = null;
let zoomPercent = 100;
let adBlockOn = true;
let loadProgress = 0;
let loadTimer = null;
let zoomOverlayOpen = false;

// ── Tab rendering ──────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tabBar');
  const newBtn = document.getElementById('btnNewTab');
  // Remove old tabs (keep newBtn)
  bar.querySelectorAll('.tab').forEach(t => t.remove());

  tabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.active ? ' active' : '');
    el.dataset.id = t.id;
    el.onclick = (e) => { if (!e.target.classList.contains('tab-close')) switchTab(t.id); };

    const icon = t.loading
      ? `<span class="tab-favicon tab-spinner">⟳</span>`
      : `<span class="tab-favicon">${t.favicon ? `<img src="${t.favicon}" width="14" height="14" style="border-radius:2px" onerror="this.style.display='none'">` : '🌐'}</span>`;

    el.innerHTML = `
      ${icon}
      <span class="tab-title">${escHtml(t.title || 'New Tab')}</span>
      <button class="tab-close" onclick="closeTab(${t.id})" title="Close">✕</button>`;
    bar.insertBefore(el, newBtn);
  });

  // Sync active tab toolbar state
  const active = tabs.find(t => t.active);
  if (active) {
    document.getElementById('urlInput').value = active.url === 'about:blank' || active.url.startsWith('https://start.duckduckgo') ? '' : active.url;
    document.getElementById('btnBack').disabled = !active.canGoBack;
    document.getElementById('btnForward').disabled = !active.canGoForward;
    updateLockIcon(active.url);
    updateBlockedBadge(active.blocked || 0);

    // show/hide new tab page
    const isNtp = !active.url || active.url === 'about:blank' || active.url.startsWith('https://start.duckduckgo');
    document.getElementById('newTabPage').style.display = isNtp ? 'flex' : 'none';

    if (active.loading) startLoadBar(); else finishLoadBar();
  }
}

function switchTab(id) {
  send('browser:switch-tab', id);
  activeId = id;
  tabs.forEach(t => t.active = t.id === id);
  renderTabs();
}

function closeTab(id) {
  send('browser:close-tab', id);
}

// ── URL bar ────────────────────────────────────────────────
function onUrlKey(e) {
  if (e.key === 'Enter') navigate(e.target.value);
  if (e.key === 'Escape') e.target.blur();
}
function onNtpKey(e) { if (e.key === 'Enter') ntpGo(); }
function ntpGo() {
  const v = document.getElementById('ntpSearch').value.trim();
  if (v) navigate(v);
}
function navigate(url) {
  send('browser:navigate', { url });
  document.getElementById('newTabPage').style.display = 'none';
  document.getElementById('ntpSearch').value = '';
}
function updateLockIcon(url) {
  const lock = document.getElementById('urlLock');
  if (!url || url === 'about:blank') { lock.textContent = ''; lock.className = 'url-lock'; return; }
  if (url.startsWith('https://') || url.startsWith('http://localhost')) {
    lock.textContent = '🔒'; lock.className = 'url-lock secure';
  } else {
    lock.textContent = '⚠️'; lock.className = 'url-lock insecure';
  }
}

// ── Zoom ───────────────────────────────────────────────────
function toggleZoomOverlay() {
  zoomOverlayOpen = !zoomOverlayOpen;
  document.getElementById('zoomOverlay').classList.toggle('visible', zoomOverlayOpen);
}
function updateZoom(percent) {
  zoomPercent = percent;
  const label = percent + '%';
  document.getElementById('zoomLevel').textContent = label;
  document.getElementById('statusZoom').textContent = label;
  const badge = document.getElementById('zoomBadge');
  badge.textContent = label;
  badge.classList.toggle('visible', percent !== 100);
}

// ── AdBlock ────────────────────────────────────────────────
function toggleAdBlock() {
  send('browser:toggle-adblock');
}
function setAdBlock(on) {
  adBlockOn = on;
  const btn = document.getElementById('btnAdblock');
  btn.title = on ? 'AdBlock ON — click to disable' : 'AdBlock OFF — click to enable';
  btn.classList.toggle('off', !on);
  document.getElementById('statusAd').textContent = on ? '🛡 AdBlock ON' : '⚠ AdBlock OFF';
  document.getElementById('statusAd').style.color = on ? 'var(--green)' : 'var(--red)';
}
function updateBlockedBadge(count) {
  const b = document.getElementById('blockedBadge');
  b.textContent = '🛡 ' + count;
  b.classList.toggle('visible', adBlockOn && count > 0);
}

// ── Load bar ───────────────────────────────────────────────
function startLoadBar() {
  clearInterval(loadTimer);
  loadProgress = 10;
  const bar = document.getElementById('loadingBar');
  bar.style.width = '10%'; bar.classList.add('active');
  loadTimer = setInterval(() => {
    loadProgress = Math.min(loadProgress + Math.random() * 15, 85);
    bar.style.width = loadProgress + '%';
  }, 200);
}
function finishLoadBar() {
  clearInterval(loadTimer);
  const bar = document.getElementById('loadingBar');
  bar.style.width = '100%';
  setTimeout(() => { bar.classList.remove('active'); bar.style.width = '0%'; }, 300);
}

// ── Keyboard shortcuts ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); send('browser:new-tab'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); if (activeId) send('browser:close-tab', activeId); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); document.getElementById('urlInput').select(); }
  if ((e.ctrlKey || e.metaKey) && e.key === '=') { e.preventDefault(); send('browser:zoom-in'); }
  if ((e.ctrlKey || e.metaKey) && e.key === '-') { e.preventDefault(); send('browser:zoom-out'); }
  if ((e.ctrlKey || e.metaKey) && e.key === '0') { e.preventDefault(); send('browser:zoom-reset'); }
  if (e.key === 'F5') send('browser:reload');
  if (e.altKey && e.key === 'ArrowLeft')  send('browser:back');
  if (e.altKey && e.key === 'ArrowRight') send('browser:forward');
  if (e.key === 'Escape') { if (zoomOverlayOpen) toggleZoomOverlay(); }
});

// ── IPC from main ──────────────────────────────────────────
ipc.on('browser:tabs-updated', (data) => {
  tabs = data;
  activeId = (data.find(t => t.active) || {}).id || null;
  renderTabs();
});
ipc.on('browser:active-tab-updated', (tab) => {
  document.getElementById('statusUrl').textContent = tab.url;
  updateBlockedBadge(tab.blocked || 0);
});
ipc.on('browser:zoom-changed', ({ percent }) => updateZoom(percent));
ipc.on('browser:adblock-toggled', ({ enabled }) => setAdBlock(enabled));

// ── Toolbar buttons ────────────────────────────────────────
document.getElementById('btnNewTab').onclick  = () => send('browser:new-tab');
document.getElementById('btnBack').onclick    = () => send('browser:back');
document.getElementById('btnForward').onclick = () => send('browser:forward');
document.getElementById('btnReload').onclick  = () => send('browser:reload');

// ── Init ───────────────────────────────────────────────────
send('browser:get-state');

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
